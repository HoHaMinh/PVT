<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập web PVT</title>
  <link rel="stylesheet"  href="/css/mdb.min.css">
</head>
<body>
<h1 class="text-primary" style="width: 20%; margin-left: 47%">Login</h1>
<h6 th:if="${#request.getParameter('error') == 'true'}" class="text-danger" style="margin-left: 44%">Sai account hoặc password</h6>
<form th:action="@{/doLogin}" method="post">
  <!-- Account input -->
  <div class="form-outline mb-4" style="width: 20%; margin-left: 40%">
    <input type="text" id="form2Example1" class="form-control" name="accountname"/>
    <label class="form-label" for="form2Example1">Account id</label>
  </div>
  <!-- Password input -->
  <div class="form-outline mb-4" style="width: 20%; margin-left: 40%">
    <input type="password" id="form2Example2" class="form-control" name="password"/>
    <label class="form-label" for="form2Example2">Password</label>
  </div>
  <!-- Submit button -->
  <button type="submit" class="btn btn-primary btn-block mb-4 justify-content-center" style="width: 20%; margin-left: 40%">Sign in</button>
</form>
<script src="/js/mdb.min.js"></script>
</body>
</html>
