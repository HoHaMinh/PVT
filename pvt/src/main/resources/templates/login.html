<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Bắt buộc phải có cho Mobile -->
    <title>Đăng nhập web PVT</title>
    <link rel="stylesheet" href="/css/mdb.min.css">
    <style>
        body {
            background-color: #f4f7f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            background: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            <div class="login-card">
                <div class="text-center mb-4">
                    <img src="https://www.hoaphat.com.vn/assets/images/logo.png" alt="Logo" style="max-height: 50px;">
                    <h3 class="text-primary mt-3">Đăng nhập PVT</h3>
                </div>

                <div th:if="${#request.getParameter('error') == 'true'}" class="alert alert-danger text-center" role="alert">
                    Sai account hoặc password!
                </div>

                <form th:action="@{/doLogin}" method="post">
                    <!-- Account input -->
                    <div class="form-outline mb-4">
                        <input type="text" id="form2Example1" class="form-control form-control-lg" name="accountname" required/>
                        <label class="form-label" for="form2Example1">Account ID</label>
                    </div>

                    <!-- Password input -->
                    <div class="form-outline mb-4">
                        <input type="password" id="form2Example2" class="form-control form-control-lg" name="password" required/>
                        <label class="form-label" for="form2Example2">Password</label>
                    </div>

                    <!-- Submit button -->
                    <button type="submit" class="btn btn-primary btn-lg btn-block">Đăng nhập</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="/js/mdb.min.js"></script>
</body>
</html>
