<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Danh sách việc PVT</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1" charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
<div class="container-fluid">
    <div class="row text-center header">
        <h2 style="color: white">PHÒNG VẬT TƯ ỐNG THÉP HÒA PHÁT ĐÀ NẴNG</h2>
    </div>
    <div>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container-fluid" style="height: 100%">
                <a class="navbar-brand col-12 col-md-3 col-lg-4 align-items-center" th:href="@{/home}">
                    <img src="https://www.hoaphat.com.vn/assets/images/logo.png" class="img-fluid">
                </a>
                <div class="collapse navbar-collapse col-12 col-md-9 col-lg-8 align-items-center"
                     id="navbarNavDropdown">
                    <ul class="navbar-nav">
                        <li class="nav-item active">
                            <a class="nav-link font-style" aria-current="page" th:href="@{/home/employee/private}">Lịch cần làm</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link font-style" th:href="@{/home/employee/video}">Lưu giữ video</a>
                        </li>
                        <li class="nav-item ">
                            <a class="nav-link font-style" th:href="@{/home/employee/image}">Lưu giữ hình ảnh</a>
                        </li>
                        <li class="nav-item dropdown active">
                            <a class="nav-link dropdown-toggle font-style" th:href="@{/home/manager/task}"
                               id="navbarDropdownMenuLink"
                               role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                Giao việc (chỉ quản lý)
                            </a>
                            <ul class="dropdown-menu" aria-labelledby="navbarDropdownMenuLink">
                                <li><a class="dropdown-item font-style" th:href="@{/home/manager/task}">Giao việc cá
                                    nhân</a></li>
                                <li><a class="dropdown-item font-style" th:href="@{/home/manager/weeklyTask}">Giao việc
                                    cá nhân lặp lại định kỳ</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div>
            <h10 style="text-align: left; height: 3%" class="text-danger" th:if="${mess != null}"
                 th:text="${mess}"></h10>
            <div style="height: 8%; width: 100%">
                <h3 class="text-primary">Lịch công việc tháng/cá nhân</h3>
                <a href="" id="addMonthEvent" style="text-decoration: none">
                    <button type="button" class="btn btn-primary" onclick="showDialog()">Thêm mới công việc tháng/cá
                        nhân
                    </button>
                </a>
                <a th:href="@{/home/manager/task/deleteTask}" style="text-decoration: none">
                    <button type="button" class="btn btn-primary">Xóa các lịch đã quá hạn</button>
                </a>
            </div>
            <div class="table-responsive" style="height: 84%">
                <table class="table table-striped table-bordered" id="new-material" th:if="${monthEventList != null}">
                    <thead id="navbar-sticky">
                    <tr>
                        <th class="col-1 col-md-1 col-lg-1">STT</th>
                        <th class="col-7 col-md-7 col-lg-7">Nội dung giao việc tháng/tuần</th>
                        <th class="col-2 col-md-2 col-lg-2">Deadline</th>
                        <th class="col-2 col-md-2 col-lg-2">Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="list,iter: ${monthEventList}">
                        <td class="center" th:text="${iter.count}"></td>
                        <td class="justify" th:text="${list.getMonthEventDescription()}"></td>
                        <td class="center" th:text="${list.getFormattedDeadlineByFormat()}"></td>
                        <td class="center">
                            <a th:href="@{/home/manager/task/showEditMonthEventForm/{id} (id=${list.getMonthEventId()})}"
                               style="text-decoration: none">
                                <button type="button" class="btn btn-outline-secondary">
                                    Chỉnh sửa
                                </button>
                            </a>
                            <a th:href="@{/home/manager/weeklyTask/delete/{id} (id=${list.getMonthEventId()})}">
                                <button type="button" class="btn btn-outline-danger">Xóa</button>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
                <div class="row smaller-font" style="height: 5%">
                    <div class="col-5">
                    </div>
                    <div class="col-5">
                        <nav aria-label="Page navigation example">
                            <ul class="pagination" th:if="${monthEventList.totalPages > 0}"
                                th:each="pageNumber : ${pageNumbers}" style="float: left; width: 30px">
                                <li th:if="${currentPage==pageNumber}" class="page-item active">
                                    <a class="page-link"
                                       th:href="@{/home/manager/task(page=${pageNumber},size=${monthEventList.size})}"
                                       th:text="${pageNumber}"></a>
                                </li>
                                <li th:unless="${currentPage==pageNumber}" class="page-item">
                                    <a class="page-link"
                                       th:href="@{/home/manager/task(page=${pageNumber},size=${monthEventList.size})}"
                                       th:text="${pageNumber}"></a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                    <div class="col-2 ">
                        <button class="btn btn-outline-primary smaller-button2" style="float: right">
                            <a th:href="@{/home}" style="text-decoration: none">Trở về trang chủ</a></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    function showDialog() {
        var numberOfRows = prompt("Hãy nhập số dòng giao việc tháng bạn muốn giao việc:");
        if (numberOfRows != null) {
            var url = "/home/manager/task/showAddMonthEventForm?rows=" + numberOfRows;
            document.getElementById("addMonthEvent").setAttribute("href", url);
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous">
</script>
</body>
</html>
