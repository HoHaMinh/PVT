<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ PVT</title>
    <base href="/">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
<div class="container-fluid p-0">
    <div th:replace="~{fragments :: header}"></div> 
    <nav th:replace="~{fragments :: nav}"></nav> 
    
    <div class="container mt-3">
        <div th:if="${message != null}" class="alert alert-warning text-center" role="alert">
            <h5 class="text-danger m-0" th:each="mess: ${message}" th:text="${mess.getMessage()}"></h5>
        </div>
    </div>

    <!-- 🔥 QUAY LẠI DÙNG .home-banner NHƯ BAN ĐẦU CHO PC -->
    <div class="home-banner d-none d-md-block mt-2">
        <img th:src="@{/img/banner.webp}" alt="Banner Hòa Phát">
    </div>

    <!-- 🔥 VẪN GIỮ LẠI WELCOME SCREEN CHO MOBILE -->
    <div class="welcome-screen-mobile d-md-none">
        <div class="welcome-content">
            <img src="https://www.hoaphat.com.vn/assets/images/logo.png" alt="Logo" class="welcome-logo">
            <h2 class="welcome-title">Hệ thống Quản lý Công việc</h2>
            <p class="welcome-subtitle">Phòng Vật tư - Ống thép Hòa Phát Đà Nẵng</p>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
