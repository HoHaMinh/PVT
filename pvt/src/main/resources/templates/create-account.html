<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Bắt buộc cho Mobile -->
    <title>Tạo tài khoản - PVT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    
    <style>
        /* Làm đẹp form tạo tài khoản */
        .account-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            background: white;
        }
        .account-card-header {
            background-color: #05428c;
            color: white;
            border-radius: 12px 12px 0 0 !important;
            padding: 15px 20px;
        }
        .form-label {
            font-weight: 600;
            color: #333;
        }
    </style>
</head>
<body class="bg-light">
<div class="container-fluid p-0">
    <!-- 🔥 ĐÃ THÊM: Header và Navbar cho đồng bộ với toàn hệ thống -->
    <div th:replace="~{fragments :: header}"></div>
    <nav th:replace="~{fragments :: nav}"></nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <!-- Trên Mobile chiếm 100%, Tablet 80%, PC 50% -->
            <div class="col-12 col-md-8 col-lg-6">
                
                <div class="card account-card">
                    <div class="card-header account-card-header text-center">
                        <h4 class="m-0 fw-bold">Tạo Tài Khoản Mới</h4>
                    </div>
                    
                    <div class="card-body p-4 p-md-5">
                        
                        <!-- Thông báo Thành công -->
                        <div th:if="${message}" class="alert alert-success text-center fw-bold" role="alert">
                            <span th:text="${message}"></span>
                        </div>

                        <!-- Thông báo Lỗi -->
                        <div th:if="${error}" class="alert alert-danger text-center fw-bold" role="alert">
                            <span th:text="${error}"></span>
                        </div>

                        <!-- Form nhập liệu -->
                        <form th:action="@{/home/manager/create-account}" method="post">
                            
                            <div class="mb-3">
                                <label class="form-label">Username <span class="text-danger">*</span></label>
                                <input type="text" name="username" class="form-control" required placeholder="Nhập ID đăng nhập..."/>
                                <div class="form-text text-muted fst-italic">Gợi ý: Nên lấy ID Bravo của nhân viên.</div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password <span class="text-danger">*</span></label>
                                <input type="password" name="password" class="form-control" required placeholder="Nhập mật khẩu..."/>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                                <input type="text" name="name" class="form-control" required placeholder="Ví dụ: Nguyễn Văn A"/>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Chức vụ <span class="text-danger">*</span></label>
                                <select name="role" class="form-select" required>
                                    <option value="ROLE_EMPLOYEE">Nhân viên</option>
                                    <option value="ROLE_MANAGER" class="text-danger fw-bold">Quản lý</option>
                                </select>
                            </div>

                            <!-- Nút bấm -->
                            <div class="d-flex flex-column flex-sm-row gap-2 mt-4 pt-3 border-top">
                                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Tạo tài khoản</button>
                                <a th:href="@{/home}" class="btn btn-outline-secondary btn-lg w-100">Trở về trang chủ</a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
