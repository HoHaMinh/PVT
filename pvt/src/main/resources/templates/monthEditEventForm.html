<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Chỉnh sửa việc PVT</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1" charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/home.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var flatpickrInputs = document.querySelectorAll('.flatpickr-input');
            var fpInstances = Array.from(flatpickrInputs).map(input => flatpickr(input, {
                enableTime: true,
                dateFormat: "Y-m-d\\TH:i",
                altInput: true,
                altFormat: "d-m-Y H:i",
                time_24hr: true
            }));

            document.querySelector('#form').addEventListener('submit', function(e) {
                var allDatesSelected = fpInstances.every(fp => fp.selectedDates.length > 0);
                if (!allDatesSelected) {
                    e.preventDefault();
                    alert('Phải chọn deadline cho công việc được giao');
                }
            });
        });
    </script>
</head>
<body>
<div class="container-fluid">
    <div th:replace="~{fragments :: header}"></div>
    <div>
        <nav th:replace="~{fragments :: nav}"></nav>
        <div>
            <div class="mb-1">
                <h10 style="text-align: left" class="text-danger" th:if="${mess != null}" th:text="${mess}"></h10>
                <h3 class="text-primary mb-2">Chỉnh sửa lịch công việc tháng/cá nhân</h3>
            </div>
            <div>
                <form class="row" method="post"
                      th:action="@{/home/manager/task/editMonthEvent(selectedValue=${selectedValue})}"
                      th:object="${monthEditEvent}" id="form">
                    <table>
                        <thead id="navbar-sticky">
                        <tr>
                            <td hidden="hidden">Id</td>
                            <td class="col-9" style="font-weight: bolder; font-size: larger">Nội dung</td>
                            <td class="col-1" style="font-weight: bolder; font-size: larger; text-align: left">Deadline</td>
                            <td class="col-2" style="font-weight: bolder; font-size: larger">Người phụ trách</td>
                            <td hidden="hidden">Month Event Status</td>
                            <td hidden="hidden">Response status</td>
                            <td hidden="hidden">Last Time Response</td>
                            <td hidden="hidden">Last Person Response</td>
                            <td hidden="hidden">Registered Day</td>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td hidden="hidden">
                                <input type="text" th:field="*{monthEventId}">
                            </td>
                            <td>
                                <textarea th:field="*{monthEventDescription}" style="width:100%;" rows="2" required></textarea>
                            </td>
                            <td>
                                <input type="text" class="flatpickr-input" placeholder="Bấm chọn thời gian"
                                       th:field="*{monthEventDeadline}" required>
                            </td>
                            <td>
                                <select class="form-control" th:field="*{account.accountName}">
                                    <option value="">-- Chọn người phụ trách --</option>
                                    <option value="ALL" th:selected="${monthEditEvent.all}">🔥 Cả phòng</option>
                                    <option th:each="acc : ${accountList}"
                                            th:value="${acc.accountName}"
                                            th:text="${acc.displayName}"
                                            th:selected="${!monthEditEvent.all and monthEditEvent.account != null and acc.accountName == monthEditEvent.account.accountName}">
                                    </option>
                                </select>
                            </td>
                            <td hidden="hidden"><input type="text" th:field="*{monthEventStatus}"></td>
                            <td hidden="hidden"><input type="text" th:field="*{responseStatus}"></td>
                            <td hidden="hidden"><input type="text" th:field="*{lastTimeResponse}"></td>
                            <td hidden="hidden"><input type="text" th:field="*{lastPersonResponse}"></td>
                            <td hidden="hidden"><input type="text" th:field="*{registeredDay}"></td>
                        </tr>
                        </tbody>
                    </table>
                    <div class="col-12 mt-3">
                        <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-12 mt-3">
            <a th:href="@{/home/employee/private(selectedValue=${selectedValue})}" style="text-decoration: none">
                <button class="btn btn-outline-primary" style="float: right">
                    Trở lại tab cũ
                </button>
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
