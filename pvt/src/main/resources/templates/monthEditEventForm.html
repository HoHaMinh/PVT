<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Chỉnh sửa việc PVT</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1" charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
<div class="container-fluid">
    <div class="row text-center header">
        <h2 style="color: white">PHÒNG VẬT TƯ ỐNG THÉP HÒA PHÁT ĐÀ NẴNG</h2>
    </div>
    <div>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container-fluid">
                <a class="navbar-brand col-12 col-md-3 col-lg-4 align-items-center" th:href="@{/home}">
                    <img src="https://www.hoaphat.com.vn/assets/images/logo.png" class="img-fluid">
                </a>
                <div class="collapse navbar-collapse col-12 col-md-9 col-lg-8 align-items-center"
                     id="navbarNavDropdown">
                    <ul class="navbar-nav">
                        <li class="nav-item active">
                            <a class="nav-link font-style" aria-current="page" th:href="@{/home/employee/private}">Lịch cần làm</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link font-style" th:href="@{/home/employee/video}">Lưu giữ video</a>
                        </li>
                        <li class="nav-item ">
                            <a class="nav-link font-style" th:href="@{/home/employee/image}">Lưu giữ hình ảnh</a>
                        </li>
                        <li class="nav-item dropdown active">
                            <a class="nav-link dropdown-toggle font-style" th:href="@{/home/manager/task}"
                               id="navbarDropdownMenuLink"
                               role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                Giao việc (chỉ quản lý)
                            </a>
                            <ul class="dropdown-menu" aria-labelledby="navbarDropdownMenuLink">
                                <li><a class="dropdown-item font-style" th:href="@{/home/manager/task}">Giao việc cá
                                    nhân</a></li>
                                <li><a class="dropdown-item font-style" th:href="@{/home/manager/weeklyTask}">Giao việc
                                    cá nhân lặp lại định kỳ</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div>
            <div class="mb-1">
                <h10 style="text-align: left" class="text-danger" th:if="${mess != null}" th:text="${mess}">
                </h10>
                <h3 class="text-primary mb-2">Chỉnh sửa lịch công việc tháng/cá
                    nhân</h3>
            </div>
            <div>
                <form class="row" method="post" th:action="@{/home/manager/task/editMonthEvent}"
                      th:object="${monthEditEvent}">
                    <table>
                        <thead id="navbar-sticky">
                        <tr>
                            <td class="col-0 col-md-0 col-lg-0" hidden="hidden">
                                Id
                            </td>
                            <td class="col-10 col-md-10 col-lg-10" style="font-weight: bolder; font-size: larger">
                                Nội dung
                            </td>
                            <td class="col-2 col-md-2 col-lg-2"
                                style="font-weight: bolder; font-size: larger; text-align: left">
                                Deadline
                            </td>
                        </tr>
                        </thead>
                        <tr>
                            <td hidden="hidden">
                                <input type="text" th:field="*{monthEventId}"
                                       th:value="${monthEditEvent.getMonthEventId()}"
                                       th:placeholder="${monthEditEvent.getMonthEventId()}">
                            </td>
                            <td>
                <textarea type="text" th:field="*{monthEventDescription}"
                          th:placeholder="${monthEditEvent.getMonthEventDescription()}"
                          th:value="${monthEditEvent.getMonthEventDescription()}"
                          style="width:100%;" rows="2"></textarea>
                            </td>
                            <td>
                                <input type="datetime-local"
                                       th:field="*{monthEventDeadline}"
                                       th:placeholder="${monthEditEvent.getMonthEventDescription()}"
                                       th:value="${monthEditEvent.getMonthEventDescription()}">
                            </td>
                        </tr>
                    </table>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">Lưu</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="col-12">
            <button class="btn btn-outline-primary smaller-button2" style="float: right">
                <a th:href="@{/home}" style="text-decoration: none">Trở về trang chủ</a></button>
        </div>
    </div>
</div>

<script>
    function showDialog() {
        var numberOfRows = prompt("Hãy nhập số dòng giao việc tháng bạn muốn giao việc:");
        if (numberOfRows != null) {
            var url = "/home/manager/task/showAddMonthEventForm?rows=" + numberOfRows;
            document.getElementById("addMonthEvent").setAttribute("href", url);
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous">
</script>
</body>
</html>
