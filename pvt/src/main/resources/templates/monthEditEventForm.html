<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Chỉnh sửa việc PVT</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1" charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var flatpickrInputs = document.querySelectorAll('.flatpickr-input');
            var fpInstances = Array.from(flatpickrInputs).map(input => flatpickr(input, {
                enableTime: true,
                dateFormat: "Y-m-d\\TH:i",
                altInput: true,
                altFormat: "d-m-Y H:i",
                time_24hr: true,
                // Add any other options you need
            }));

            document.querySelector('#form').addEventListener('submit', function(e) {
                var allDatesSelected = fpInstances.every(fp => fp.selectedDates.length > 0);
                if (!allDatesSelected) {
                    e.preventDefault();
                    alert('Phải chọn deadline cho công việc được giao');
                }
            });
        });
    </script>
</head>
<body>
<div class="container-fluid">
    <div th:replace="~{fragments :: header}"></div> <!-- Dùng header của fragments -->
    <div>
        <nav th:replace="~{fragments :: nav}"></nav> <!-- Dùng nav của fragments -->
        <div>
            <div class="mb-1">
                <h10 style="text-align: left" class="text-danger" th:if="${mess != null}" th:text="${mess}">
                </h10>
                <h3 class="text-primary mb-2">Chỉnh sửa lịch công việc tháng/cá
                    nhân</h3>
            </div>
            <div>
                <form class="row" method="post" th:action="@{/home/manager/task/editMonthEvent}"
                      th:object="${monthEditEvent}" id="form">
                    <table>
                        <thead id="navbar-sticky">
                        <tr>
                            <td class="col-0 col-md-0 col-lg-0" hidden="hidden">
                                Id
                            </td>
                            <td class="col-9 col-md-9 col-lg-9" style="font-weight: bolder; font-size: larger">
                                Nội dung
                            </td>
                            <td class="col-1 col-md-1 col-lg-1"
                                style="font-weight: bolder; font-size: larger; text-align: left">
                                Deadline
                            </td>
                            <td class="col-2 col-md-2 col-lg-2" style="font-weight: bolder; font-size: larger">
                                Người phụ trách
                            </td>
                            <td class="col-0 col-md-0 col-lg-0" hidden="hidden">
                                Month Event Status
                            </td>
                            <td class="col-0 col-md-0 col-lg-0" hidden="hidden">
                                Response status
                            </td>
                            <td class="col-0 col-md-0 col-lg-0" hidden="hidden">
                                Last Time Response
                            </td>
                            <td class="col-0 col-md-0 col-lg-0" hidden="hidden">
                                Last Person Response
                            </td>
                            <td class="col-0 col-md-0 col-lg-0" hidden="hidden">
                                Registered Day
                            </td>
                        </tr>
                        </thead>
                        <tr>
                            <td hidden="hidden">
                                <input type="text" th:field="*{monthEventId}"
                                       th:value="${monthEditEvent.getMonthEventId()}"
                                       th:placeholder="${monthEditEvent.getMonthEventId()}">
                            </td>
                            <td>
                                <textarea type="text" th:field="*{monthEventDescription}"
                                          th:placeholder="${monthEditEvent.getMonthEventDescription()}"
                                          th:value="${monthEditEvent.getMonthEventDescription()}"
                                          style="width:100%;" rows="2" required></textarea>
                            </td>
                            <td>
                                <input type="text"
                                       class="flatpickr-input" placeholder="Bấm chọn thời gian"
                                       th:field="*{monthEventDeadline}"
                                       th:placeholder="${monthEditEvent.getMonthEventDescription()}"
                                       th:value="${monthEditEvent.getMonthEventDescription()}" required>
                            </td>
                            <td>
                                <select class="form-control" th:field="*{account.accountName}">

                                    <option value="">-- Chọn người phụ trách --</option>

                                    <!-- ✅ Cả phòng -->
                                    <option value="ALL"
                                            th:selected="${monthEditEvent.all}">
                                        🔥 Cả phòng
                                    </option>

                                    <!-- Danh sách nhân viên -->
                                    <option th:each="acc : ${accountList}"
                                            th:value="${acc.accountName}"
                                            th:text="${acc.displayName}"
                                            th:selected="${!monthEditEvent.all and monthEditEvent.account != null and acc.accountName == monthEditEvent.account.accountName}">
                                    </option>

                                </select>
                            </td>
                            <td hidden="hidden">
                                <input type="text" th:field="*{monthEventStatus}"
                                       th:value="${monthEditEvent.getMonthEventStatus()}"
                                       th:placeholder="${monthEditEvent.getMonthEventStatus()}">
                            </td>
                            <td hidden="hidden">
                                <input type="text" th:field="*{responseStatus}"
                                       th:value="${monthEditEvent.getResponseStatus()}"
                                       th:placeholder="${monthEditEvent.getResponseStatus()}">
                            </td>
                            <td hidden="hidden">
                                <input type="text" th:field="*{lastTimeResponse}"
                                       th:value="${monthEditEvent.getLastTimeResponse()}"
                                       th:placeholder="${monthEditEvent.getLastTimeResponse()}">
                            </td>
                            <td hidden="hidden">
                                <input type="text" th:field="*{lastPersonResponse}"
                                       th:value="${monthEditEvent.getLastPersonResponse()}"
                                       th:placeholder="${monthEditEvent.getLastPersonResponse()}">
                            </td>
                            <td hidden="hidden">
                                <input type="text" th:field="*{registeredDay}"
                                       th:value="${monthEditEvent.getRegisteredDay()}"
                                       th:placeholder="${monthEditEvent.getRegisteredDay()}">
                            </td>
                        </tr>
                    </table>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">Lưu</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="col-12">
            <a th:href="@{/home/manager/task}" style="text-decoration: none">
                <button class="btn btn-outline-primary" style="float: right">
                    Trở về trang giao việc cá nhân
                </button>
            </a>
        </div>
    </div>
</div>

<script>
    function showDialog() {
        var numberOfRows = prompt("Hãy nhập số dòng giao việc tháng bạn muốn giao việc:");
        if (numberOfRows != null) {
            var url = "/home/manager/task/showAddMonthEventForm?rows=" + numberOfRows;
            document.getElementById("addMonthEvent").setAttribute("href", url);
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous">
</script>
</body>
</html>
