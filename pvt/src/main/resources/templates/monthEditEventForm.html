<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Bắt buộc cho Mobile -->
    <title>Chỉnh sửa việc PVT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <style>
        /* Làm đẹp form trên Mobile */
        .edit-form-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 25px;
            margin-bottom: 30px;
        }
        .form-label {
            font-weight: 600;
            color: #05428c;
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var flatpickrInputs = document.querySelectorAll('.flatpickr-input');
            var fpInstances = Array.from(flatpickrInputs).map(input => flatpickr(input, {
                enableTime: true,
                dateFormat: "Y-m-d\\TH:i",
                altInput: true,
                altFormat: "d-m-Y H:i",
                time_24hr: true
            }));

            document.querySelector('#form').addEventListener('submit', function(e) {
                var allDatesSelected = fpInstances.every(fp => fp.selectedDates.length > 0);
                if (!allDatesSelected) {
                    e.preventDefault();
                    alert('Phải chọn deadline cho công việc được giao');
                }
            });
        });
    </script>
</head>
<body class="bg-light">
<div class="container-fluid p-0">
    <div th:replace="~{fragments :: header}"></div>
    <nav th:replace="~{fragments :: nav}"></nav>
    
    <div class="container mt-4">
        <div class="mb-3">
            <h5 class="text-danger fw-bold" th:if="${mess != null}" th:text="${mess}"></h5>
            <h4 class="text-primary fw-bold">Chỉnh sửa lịch công việc</h4>
        </div>

        <!-- 🔥 ĐÃ SỬA: Bỏ Table, dùng Card và Grid System -->
        <div class="edit-form-card">
            <form method="post" th:action="@{/home/manager/task/editMonthEvent(selectedValue=${selectedValue})}" th:object="${monthEditEvent}" id="form">
                
                <!-- Các trường ẩn (Hidden fields) -->
                <input type="hidden" th:field="*{monthEventId}">
                <input type="hidden" th:field="*{monthEventStatus}">
                <input type="hidden" th:field="*{responseStatus}">
                <input type="hidden" th:field="*{lastTimeResponse}">
                <input type="hidden" th:field="*{lastPersonResponse}">
                <input type="hidden" th:field="*{registeredDay}">

                <div class="row g-4">
                    <!-- Cột Nội dung (Chiếm 100% trên Mobile, 12 cột trên PC) -->
                    <div class="col-12">
                        <label class="form-label">Nội dung công việc <span class="text-danger">*</span></label>
                        <textarea th:field="*{monthEventDescription}" class="form-control" rows="3" required placeholder="Nhập nội dung công việc..."></textarea>
                    </div>

                    <!-- Cột Deadline (Chiếm 100% trên Mobile, 6 cột trên PC) -->
                    <div class="col-12 col-md-6">
                        <label class="form-label">Deadline <span class="text-danger">*</span></label>
                        <input type="text" class="form-control flatpickr-input bg-white" placeholder="Bấm chọn thời gian" th:field="*{monthEventDeadline}" required>
                    </div>

                    <!-- Cột Người phụ trách (Chiếm 100% trên Mobile, 6 cột trên PC) -->
                    <div class="col-12 col-md-6">
                        <label class="form-label">Người phụ trách <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{account.accountName}">
                            <option value="">-- Chọn người phụ trách --</option>
                            <option value="ALL" th:selected="${monthEditEvent.all}" class="fw-bold text-danger">🔥 Cả phòng</option>
                            <option th:each="acc : ${accountList}"
                                    th:value="${acc.accountName}"
                                    th:text="${acc.displayName}"
                                    th:selected="${!monthEditEvent.all and monthEditEvent.account != null and acc.accountName == monthEditEvent.account.accountName}">
                            </option>
                        </select>
                    </div>
                </div>

                <!-- Nút bấm -->
                <div class="d-flex flex-wrap gap-2 mt-4 pt-3 border-top">
                    <button type="submit" class="btn btn-primary px-4">Lưu thay đổi</button>
                    <a th:href="@{/home/employee/private(selectedValue=${selectedValue})}" class="btn btn-outline-secondary ms-auto">
                        Hủy & Trở lại
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
