<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Video PVT</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap"
          rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            margin: 0;
        }

        .video-wrapper {
            padding: 30px 20px 50px;
            border-top: 3px solid #1a56a0; /* ✅ đường kẻ xanh tách navbar */
            min-height: calc(100vh - 140px);
        }

        /* Tiêu đề chính */
        .page-title {
            font-size: 1.35rem;
            font-weight: 600;
            color: #1a56a0;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 3px solid #1a56a0;
            display: inline-block;
        }

        /* Album tabs */
        .album-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .album-tab {
            padding: 10px 22px;
            border-radius: 25px;
            border: 1px solid #d0d4dc;
            background: #fff;
            color: #555;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .album-tab:hover {
            border-color: #1a56a0;
            color: #1a56a0;
        }

        .album-tab.active {
            background: #1a56a0;
            color: #fff;
            border-color: #1a56a0;
            font-weight: 600;
        }

        /* Video grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .video-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 25px rgba(26,86,160,0.15);
        }

        .video-thumb {
            position: relative;
            aspect-ratio: 16/9;
            background: #000;
            overflow: hidden;
        }

        .video-thumb video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .video-card:hover .play-overlay {
            background: rgba(26,86,160,0.5);
        }

        .play-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .play-btn svg {
            width: 26px;
            height: 26px;
            fill: #1a56a0;
            margin-left: 4px;
        }

        .video-info {
            padding: 14px 16px;
        }

        .video-name {
            font-size: 1rem;
            font-weight: 600;
            color: #222;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-meta {
            font-size: 0.82rem;
            color: #777;
            margin-top: 6px;
        }

        /* ── Lightbox video ── */
        .vlightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(5,5,10,0.97);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .vlightbox.active {
            display: flex;
            animation: lbFadeIn 0.22s ease;
        }

        @keyframes lbFadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .vl-wrap {
            width: 88vw;
            max-width: 1100px;
        }

        .vl-wrap video {
            width: 100%;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            background: #000;
            display: block;
        }

        .vl-close {
            position: fixed;
            top: 18px; right: 24px;
            width: 38px; height: 38px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
            z-index: 10001;
        }

        .vl-close:hover { background: rgba(192,57,43,0.6); }

        .vl-nav {
            position: fixed;
            top: 50%; transform: translateY(-50%);
            width: 44px; height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
            z-index: 10001;
        }

        .vl-nav:hover { background: rgba(192,57,43,0.5); }
        .vl-prev { left: 20px; }
        .vl-next { right: 20px; }

        .vl-counter {
            margin-top: 12px;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.1em;
        }

        .vl-caption {
            margin-top: 5px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.55);
            font-weight: 300;
        }

        /* ── Empty ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
        }

        /* Back button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 35px;
            padding: 10px 24px;
            border: 1px solid #1a56a0;
            border-radius: 30px;
            color: #1a56a0;
            font-weight: 500;
            text-decoration: none;
            background: #fff;
            transition: all 0.25s;
        }

        .back-btn:hover {
            background: #1a56a0;
            color: #fff;
        }
    </style>
</head>
<body>
<div class="container-fluid p-0">
    <div th:replace="~{fragments :: header}"></div>
    <nav th:replace="~{fragments :: nav}"></nav>

    <div class="video-wrapper">
        <div class="container">
            <h2 class="page-title">📹 Thư viện Video</h2>

            <!-- Empty state -->
            <div th:if="${videoAlbums == null or videoAlbums.isEmpty()}" class="empty-state text-center py-5">
                <p class="fs-5 text-muted">Chưa có video nào. Hãy tạo subfolder trong thư mục video trên máy chủ.</p>
            </div>

            <div th:if="${videoAlbums != null and !videoAlbums.isEmpty()}">

                <!-- Album tabs -->
                <div class="album-tabs">
                    <button th:each="album, stat : ${videoAlbums}"
                            class="album-tab"
                            th:classappend="${stat.first} ? 'active' : ''"
                            th:text="${album.key}"
                            th:id="'vtab-' + ${stat.index}"
                            th:attr="onclick='switchVideoAlbum(' + ${stat.index} + ')'"></button>
                </div>

                <!-- Album panels -->
                <div th:each="album, stat : ${videoAlbums}"
                     th:id="'vpanel-' + ${stat.index}"
                     class="album-panel"
                     th:classappend="${stat.first} ? 'active' : ''">

                    <div class="video-grid">
                        <div th:each="vidUrl, vidStat : ${album.value}"
                             class="video-card"
                             th:data-url="${vidUrl}"
                             th:data-index="${vidStat.index}"
                             th:data-panel="${stat.index}"
                             onclick="openVideoLight(this)">

                            <div class="video-thumb">
                                <video th:src="${vidUrl}" preload="none" muted></video>
                                <div class="play-overlay">
                                    <div class="play-btn">
                                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                    </div>
                                </div>
                            </div>

                            <div class="video-info">
                                <div class="video-name" th:text="${vidUrl}">
                                    <!-- JS sẽ thay bằng tên file -->
                                </div>
                                <div class="video-meta"
                                     th:text="${album.key} + ' · Video ' + (${vidStat.index + 1}) + '/' + ${vidStat.size}">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <a th:href="@{/home}" class="back-btn">← Trở về trang chủ</a>
        </div>
    </div>
</div>

<!-- Video Lightbox -->
<div class="vlightbox" id="vLightbox">
    <button class="vl-close" onclick="closeVideoLight()">✕</button>
    <button class="vl-nav vl-prev" onclick="navigateVideo(-1)">&#8592;</button>
    <button class="vl-nav vl-next" onclick="navigateVideo(1)">&#8594;</button>

    <div class="vl-wrap">
        <video id="vl-video" controls autoplay>
            <source id="vl-source" src="" type="video/mp4">
        </video>
    </div>

    <div class="vl-counter" id="vl-counter"></div>
    <div class="vl-caption" id="vl-caption"></div>
</div>
<script th:inline="javascript">
    /* Tự động lấy tên file */
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.video-name').forEach(function (el) {
            let url = el.textContent.trim();
            let filename = url.substring(url.lastIndexOf('/') + 1);
            if (filename) {
                el.textContent = decodeURIComponent(filename);
            }
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
<script>
    // ── Thumbnail: seek về giây 1 để hiện preview ──
    document.querySelectorAll('.video-thumb video').forEach(v => {
        v.addEventListener('loadedmetadata', () => { v.currentTime = 1; });
    });

    // ── Switch album ──
    let currentVideoPanelIndex = 0;
    let currentVideoIndex = 0;

    function switchVideoAlbum(index) {
        document.querySelectorAll('.album-tab').forEach((t, i) => {
            t.classList.toggle('active', i === index);
        });
        document.querySelectorAll('.album-panel').forEach((p, i) => {
            p.classList.toggle('active', i === index);
        });
        currentVideoPanelIndex = index;
    }

    // ── Lightbox ──
    function openVideoLight(el) {
        currentVideoPanelIndex = parseInt(el.dataset.panel);
        currentVideoIndex      = parseInt(el.dataset.index);
        showVideoLight();
        document.getElementById('vLightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function showVideoLight() {
        const panel = document.getElementById('vpanel-' + currentVideoPanelIndex);
        const cards = panel.querySelectorAll('.video-card');
        const total = cards.length;
        const card  = cards[currentVideoIndex];

        const video  = document.getElementById('vl-video');
        const source = document.getElementById('vl-source');

        video.pause();
        source.src = card.dataset.url;
        video.load();
        video.play();

        document.getElementById('vl-counter').textContent =
            (currentVideoIndex + 1) + ' / ' + total;

        const tab = document.getElementById('vtab-' + currentVideoPanelIndex);
        const filename = card.dataset.url.split('/').pop();
        document.getElementById('vl-caption').textContent =
            (tab ? tab.textContent.trim() + ' · ' : '') + filename;
    }

    function navigateVideo(dir) {
        const panel = document.getElementById('vpanel-' + currentVideoPanelIndex);
        const total = panel.querySelectorAll('.video-card').length;
        currentVideoIndex = (currentVideoIndex + dir + total) % total;
        showVideoLight();
    }

    function closeVideoLight() {
        const video = document.getElementById('vl-video');
        video.pause();
        document.getElementById('vLightbox').classList.remove('active');
        document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) {
        if (!document.getElementById('vLightbox').classList.contains('active')) return;
        if (e.key === 'Escape')     closeVideoLight();
        if (e.key === 'ArrowRight') navigateVideo(1);
        if (e.key === 'ArrowLeft')  navigateVideo(-1);
    });

    // Fix tab đầu active
    document.addEventListener('DOMContentLoaded', function () {
        const firstTab = document.querySelector('.album-tab');
        if (firstTab) {
            document.querySelectorAll('.album-tab').forEach(t => t.classList.remove('active'));
            firstTab.classList.add('active');
        }
    });
</script>
</body>
</html>
