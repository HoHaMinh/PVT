<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Video PVT</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1" charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
<div class="container-fluid">
    <div class="row text-center header">
        <h2 style="color: white" class="col-10">PHÒNG VẬT TƯ ỐNG THÉP HÒA PHÁT ĐÀ NẴNG</h2>
        <div class="col-2 text-end" style="float: right">
            <div class="dropdown mt-2" style="display: flex; align-items: center; justify-content: center;">
                <p class="greeting-text" th:text="'Xin chào: ' +${username}"></p>
            </div>
        </div>
    </div>
    <div>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container-fluid">
                <a class="navbar-brand col-12 col-md-3 col-lg-4 align-items-center" th:href="@{/home}">
                    <img src="https://www.hoaphat.com.vn/assets/images/logo.png" class="img-fluid">
                </a>
                <div class="collapse navbar-collapse col-12 col-md-9 col-lg-8 align-items-center"
                     id="navbarNavDropdown">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link font-style" aria-current="page" th:href="@{/home/employee/private}">Lịch cần làm</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link font-style" th:href="@{/home/employee/video}">Lưu giữ video</a>
                        </li>
                        <li class="nav-item ">
                            <a class="nav-link font-style" th:href="@{/home/employee/image}">Lưu giữ hình ảnh</a>
                        </li>
                        <li class="nav-item dropdown ">
                            <a class="nav-link dropdown-toggle font-style" th:href="@{/home/manager/task}"
                               id="navbarDropdownMenuLink"
                               role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                Giao việc (chỉ quản lý)
                            </a>
                            <ul class="dropdown-menu" aria-labelledby="navbarDropdownMenuLink">
                                <li><a class="dropdown-item font-style" th:href="@{/home/manager/task}">Giao việc cá
                                    nhân</a></li>
                                <li><a class="dropdown-item font-style" th:href="@{/home/manager/weeklyTask}">Giao việc
                                    cá nhân lặp lại định kỳ</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div class="container-fluid">
            <!-- Carousel wrapper -->
            <div id="carouselVideoExample" class="carousel slide carousel-fade" data-mdb-ride="carousel">
                <!-- Indicators -->
                <div class="carousel-indicators">
                    <button type="button" data-mdb-target="#carouselVideoExample" data-mdb-slide-to="0" class="active"
                            aria-current="true" aria-label="Slide 1"></button>
                    <!--          <button type="button" data-mdb-target="#carouselVideoExample" data-mdb-slide-to="1"-->
                    <!--                  aria-label="Slide 2"></button>-->
                    <!--          <button type="button" data-mdb-target="#carouselVideoExample" data-mdb-slide-to="2"-->
                    <!--                  aria-label="Slide 3"></button>-->
                </div>

                <!-- Inner -->
                <div class="carousel-inner">
                    <!-- Single item -->
                    <div class="carousel-item active">
                        <video class="img-fluid" autoplay loop muted
                               style="width: 100%; height: 100%; object-fit: contain;">
                            <source th:src="@{/video/dancer1.mp4}" type="video/mp4"/>
                        </video>
                        <div class="carousel-caption d-none d-md-block">
                            <h5>Dancer thì cũng chỉ tầm này</h5>
                        </div>
                    </div>

                    <!-- Single item -->
                    <!--          <div class="carousel-item">-->
                    <!--            <video class="img-fluid" autoplay loop muted style="width: 100%; height: 100%; object-fit: contain;">-->
                    <!--              <source th:src="@{/video/dancer2.mp4}" type="video/mp4" />-->
                    <!--            </video>-->
                    <!--            <div class="carousel-caption d-none d-md-block">-->
                    <!--              <h5>Dancer thì cũng chỉ tầm này version 2</h5>-->
                    <!--            </div>-->
                    <!--          </div>-->

                    <!-- Single item -->
                    <!--          <div class="carousel-item">-->
                    <!--            <video class="img-fluid" autoplay loop muted>-->
                    <!--              <source src="https://mdbcdn.b-cdn.net/img/video/Agua-natural.mp4" type="video/mp4" />-->
                    <!--            </video>-->
                    <!--            <div class="carousel-caption d-none d-md-block">-->
                    <!--              <h5>Third slide label</h5>-->
                    <!--              <p>-->
                    <!--                Praesent commodo cursus magna, vel scelerisque nisl consectetur.-->
                    <!--              </p>-->
                    <!--            </div>-->
                    <!--          </div>-->
                    <!--        </div>-->
                    <!-- Inner -->

                    <!-- Controls -->
                    <button class="carousel-control-prev" type="button" data-mdb-target="#carouselVideoExample"
                            data-mdb-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-mdb-target="#carouselVideoExample"
                            data-mdb-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
                <!-- Carousel wrapper -->
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous">
</script>
<script
        type="text/javascript"
        src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.2/mdb.min.js"
></script>

</html>
