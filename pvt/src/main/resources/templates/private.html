<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Nhắc lịch PVT</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1" charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
    <script type="text/javascript">
        function parseDate(input) {
            var parts = input.split(' ');
            var timeParts = parts[0].split(':');
            var dateParts = parts[1].split('-');
            return new Date(dateParts[2], dateParts[1]-1, dateParts[0], timeParts[0], timeParts[1]);
        }

        function loadData() {
            var selectedValue = $("input[name='options-outlined']:checked").val();
            $.ajax({
                url: "/home/employee/filterRestful",
                type: 'get',
                data: {selectedValue: selectedValue},
                dataType: "json",
                success: function (data) {
                    let result = '';
                    for (let i = 0; i < data.monthEventList.length; i++) {
                        var deadlineString = data.monthEventList[i].monthEventDeadline;
                        var deadline = parseDate(deadlineString);
                        var now = new Date();
                        var timeDiff = deadline - now;
                        var minutesDiff = Math.ceil(timeDiff / (1000 * 60));
                        var rowClass = '';

                        if (minutesDiff <= 10) {
                            rowClass = 'warning';
                        }

                        result += `
                    <tr class="${rowClass}">
                        <td class="center">${i + 1}</td>
                        <td class="justify">${data.monthEventList[i].monthEventDescription}</td>`;
                        if(data.monthEventList[i].registeredDay === '00:00 01-01-2023') {
                            result += `<td class="center">Không hiển thị</td>`;
                        } else {
                            result += `<td class="center">${data.monthEventList[i].registeredDay}</td>`;
                        }
                        result +=`<td class="center">${data.monthEventList[i].monthEventDeadline}</td>`;
                        if(data.monthEventList[i].lastTimeResponse === '00:00 01-01-2023') {
                            result += `<td class="justify">Chưa có phản hồi</td>`;
                        } else {
                            result += `<td class="justify">${data.monthEventList[i].lastPersonResponse} lúc ${data.monthEventList[i].lastTimeResponse}</td>`;
                        }
                        result +=`<td class="center">
                            <a href="/home/employee/private/showEventResponseForm/${data.monthEventList[i].monthEventId}"
                                style="text-decoration: none">`;
                        if (data.monthEventList[i].responseStatus === 0) {
                            result += `<button type="button" class="btn btn-secondary">Xem</button>`;
                        } else if (data.monthEventList[i].responseStatus === 2) {
                            result += ` <button type="button" class="btn btn-warning">Xem</button>`;
                        } else if (data.monthEventList[i].responseStatus === 1) {
                            result += `<button type="button" class="btn btn-success">Xem</button>`;
                        }
                        result += `</a></td></tr>`;
                    }
                    $("#result").html(result);
                    var selectedValue = data.nameFilter;
                },
                error: function (e) {
                }
            });
        }

        $(document).ready(function () {
            $("input[name='options-outlined']").change(loadData);
            loadData();
            setInterval(loadData, 5000);
        });
    </script>


<body>
<div class="container-fluid">
    <div class="row text-center header">
        <h2 style="color: white" class="col-9.5">PHÒNG VẬT TƯ ỐNG THÉP HÒA PHÁT ĐÀ NẴNG</h2>
        <div class="col-2.5 text-end" style="float: right">
            <div class="dropdown mt-2" style="display: flex; align-items: center; justify-content: center;">

    </div>

                    <ul class="navbar-nav">
                        <li class="nav-item active">
                            <a class="nav-link font-style" aria-current="page" th:href="@{/home/employee/private}">Lịch
                                cần làm</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link font-style" th:href="@{/home/employee/video}">Lưu giữ video</a>
                        </li>
                        <li class="nav-item ">
                            <a class="nav-link font-style" th:href="@{/home/employee/image}">Lưu giữ hình ảnh</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle font-style" th:href="@{/home/manager/task}"

                               role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                Giao việc (chỉ quản lý)
                            </a>
                            <ul class="dropdown-menu" aria-labelledby="navbarDropdownMenuLink">
                                <li><a class="dropdown-item font-style" th:href="@{/home/manager/task}">Giao việc cá
                                    nhân</a></li>
                                <li><a class="dropdown-item font-style" th:href="@{/home/manager/weeklyTask}">Giao việc
                                    cá nhân lặp lại định kỳ</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div>
            <div th:each="security: ${sercuritySchedule}" class="mb-2">
                <h5 th:text="${security.getStr1()}"></h5>
                <strong th:text="${security.getStr2()} + '. '"></strong><strong
                    th:text="${security.getStr3()} + '. '"></strong><strong
                    th:text="${security.getStr4()}"></strong>
            </div>
            <h3 class="text-primary">Nhắc nhở lịch cần làm</h3>
            <div class="row mb-3 mt-3">

                    <label class="btn btn-outline-primary" for="1" style="flex-grow: 1;">All</label>
                </div>
                <div class="col-1 col-md-1 col-lg-1" style="display: flex; flex-direction: column;">
                    <input type="radio" class="btn-check" name="options-outlined" id="2" autocomplete="off"
                           value="Tín" th:checked="${selectedValue == 'Tín'}" style="flex-grow: 1;">
                    <label class="btn btn-outline-primary" for="2" style="flex-grow: 1;">Tín</label>
                </div>
                <div class="col-1 col-md-1 col-lg-1" style="display: flex; flex-direction: column;">
                    <input type="radio" class="btn-check" name="options-outlined" id="3" autocomplete="off"
                           value="Nguyên" th:checked="${selectedValue == 'Nguyên'}" style="flex-grow: 1;">
                    <label class="btn btn-outline-primary" for="3" style="flex-grow: 1;">Nguyên</label>
                </div>
                <div class="col-1 col-md-1 col-lg-1" style="display: flex; flex-direction: column;">
                    <input type="radio" class="btn-check" name="options-outlined" id="4" autocomplete="off"
                           value="A Trầm" th:checked="${selectedValue == 'A Trầm'}" style="flex-grow: 1;">
                    <label class="btn btn-outline-primary" for="4" style="flex-grow: 1;">A Trầm</label>
                </div>
                <div class="col-1 col-md-1 col-lg-1" style="display: flex; flex-direction: column;">
                    <input type="radio" class="btn-check" name="options-outlined" id="5" autocomplete="off"
                           value="Thắm" th:checked="${selectedValue == 'Thắm'}" style="flex-grow: 1;">
                    <label class="btn btn-outline-primary" for="5" style="flex-grow: 1;">Thắm</label>
                </div>
                <div class="col-1 col-md-1 col-lg-1" style="display: flex; flex-direction: column;">
                    <input type="radio" class="btn-check" name="options-outlined" id="6" autocomplete="off"
                           value="Mơ" th:checked="${selectedValue == 'Mơ'}" style="flex-grow: 1;">
                    <label class="btn btn-outline-primary" for="6" style="flex-grow: 1;">Mơ</label>
                </div>
                <div class="col-1 col-md-1 col-lg-1" style="display: flex; flex-direction: column;">
                    <input type="radio" class="btn-check" name="options-outlined" id="7" autocomplete="off"
                           value="Hảo" th:checked="${selectedValue == 'Hảo'}" style="flex-grow: 1;">
                    <label class="btn btn-outline-primary" for="7" style="flex-grow: 1;">Hảo</label>
                </div>
                <div class="col-1 col-md-1 col-lg-1" style="display: flex; flex-direction: column;">
                    <input type="radio" class="btn-check" name="options-outlined" id="8" autocomplete="off"
                           value="A Trọng" th:checked="${selectedValue == 'A Trọng'}" style="flex-grow: 1;">
                    <label class="btn btn-outline-primary" for="8" style="flex-grow: 1;">A Trọng</label>
                </div>
                <div class="col-1 col-md-1 col-lg-1" style="display: flex; flex-direction: column;">
                    <input type="radio" class="btn-check" name="options-outlined" id="9" autocomplete="off"
                           value="Minh" th:checked="${selectedValue == 'Minh'}" style="flex-grow: 1;">
                    <label class="btn btn-outline-primary" for="9" style="flex-grow: 1;">Minh</label>
                </div>
                <div class="col-1 col-md-1 col-lg-1" style="display: flex; flex-direction: column;">
                    <input type="radio" class="btn-check" name="options-outlined" id="10" autocomplete="off"
                           value="C Đào" th:checked="${selectedValue == 'C Đào'}" style="flex-grow: 1;">
                    <label class="btn btn-outline-primary" for="10" style="flex-grow: 1;">C Đào</label>
                </div>
                <div class="col-1 col-md-1 col-lg-1" style="display: flex; flex-direction: column;">
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-bordered table-hover" id="new-material"
                       th:if="${monthEventListByTime != null}">
                    <thead id="navbar-sticky">
                    <tr>
                        <th class="col-0.3">STT</th>
                        <th class="col-4.5">Nội dung công việc</th>
                        <th class="col-1.5">Ngày giao việc</th>
                        <th class="col-1.5">Deadline</th>
                        <th class="col-2.5">Phản hồi gần nhất</th>
                        <th class="col-0.7">Xem</th>
                    </tr>
                    </thead>
                    <tbody id="result">
                    <tr th:each="list,iter: ${monthEventListByTime}">
                        <td class="center" th:text="${iter.count}"></td>
                        <td class="justify" th:text="${list.getMonthEventDescription()}"></td>
                        <td class="center" th:if="${list.getRegisteredDay() == '00:00 01-01-2023'}" th:text="Không hiển thị"></td>
                        <td class="center" th:if="${list.getRegisteredDay() != '00:00 01-01-2023'}" th:text="${list.getFormattedRegisteredDay()}"></td>
                        <td class="center" th:text="${list.getFormattedDeadlineByFormat()}"></td>
                        <td class="justify" th:if="${list.getLastTimeResponse() == '00:00 01-01-2023'}"
                            th:text="Chưa có phản hồi"></td>
                        <td class="justify" th:if="${list.getLastTimeResponse() != '00:00 01-01-2023'}"
                            th:text="${list.getLastPersonResponse()} + ' lúc ' + ${list.getFormattedLastTimeResponse()}"></td>
                        <td class="center">
                            <a th:href="@{/home/employee/private/showEventResponseForm/{id} (id=${list.getMonthEventId()})}"
                               style="text-decoration: none">
                                <button type="button" class="btn btn-secondary"
                                        th:if="${list.getResponseStatus() == 0}">
                                    Xem
                                </button>
                                <button type="button" class="btn btn-warning"
                                        th:if="${list.getResponseStatus() == 2}">
                                    Xem
                                </button>
                                <button type="button" class="btn btn-success"
                                        th:if="${list.getResponseStatus() == 1}">
                                    Xem
                                </button>
                            </a>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>
            <div class="row smaller-font">
                <!--                    <div class="col-5">-->
                <!--                    </div>-->
                <!--                    <div class="col-5">-->
                <!--                        <button class="btn btn-outline-primary smaller-button2">-->

                <!--                        <a></a>-->

                <!--                        </button>-->
                <!--                    </div>-->
                <div class="col-12 ">
