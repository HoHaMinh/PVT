<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Forbidden</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff5f6d, #ffc371);
            color: #fff;
        }

        .error-container {
            text-align: center;
            max-width: 400px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        h1 {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .home-link {
            display: inline-block;
            padding: 10px 20px;
            font-size: 16px;
            color: #ffc371;
            background: #ff5f6d;
            text-decoration: none;
            border-radius: 20px;
            transition: background 0.3s;
        }

        .home-link:hover {
            background: #ffc371;
            color: #ff5f6d;
        }

        .animation-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: pulse 2s infinite;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

    </style>
</head>
<body>
<div class="error-container">
    <h1>403</h1>
    <p>Xin lỗi, bạn không có quyền truy cập trang này.</p>
    <a href="/" class="home-link">Quay lại Trang Chủ</a>
    <div class="animation-box"></div>
</div>
</body>
</html>
