<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Bắt buộc cho Mobile -->
    <title>403 Forbidden - PVT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Giữ nguyên màu nền Gradient tuyệt đẹp của bạn */
            background: linear-gradient(135deg, #ff5f6d, #ffc371);
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Hiệu ứng nảy cho số 403 */
        .bounce-text {
            animation: bounce 2s infinite;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
        }

        /* Hiệu ứng tỏa sóng phía sau */
        .animation-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: pulse 2s infinite;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none; /* Không cản trở việc bấm nút */
        }

        /* Đưa nội dung lên trên hiệu ứng sóng */
        .content-wrapper {
            position: relative;
            z-index: 1;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">

    <!-- Container chính -->
    <div class="container px-3">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-6 col-lg-4">
                
                <!-- Hộp thông báo -->
                <div class="text-center p-4 p-md-5 rounded-4 shadow-lg position-relative" style="background: rgba(0, 0, 0, 0.65);">
                    
                    <!-- Hiệu ứng sóng -->
                    <div class="animation-box"></div>
                    
                    <!-- Nội dung -->
                    <div class="content-wrapper">
                        <h1 class="display-1 fw-bold text-white mb-3 bounce-text">403</h1>
                        <p class="fs-5 text-light mb-4">Xin lỗi, bạn không có quyền truy cập trang này.</p>
                        
                        <!-- Nút bấm chuẩn Mobile (to, dễ bấm) -->
                        <a href="/" class="btn btn-warning btn-lg rounded-pill fw-bold px-4 shadow">
                            &larr; Quay lại Trang Chủ
                        </a>
                    </div>

                </div>

            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
