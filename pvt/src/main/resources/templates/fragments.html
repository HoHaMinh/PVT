<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header</title>
</head>
<body>
<!-- Header -->
<div th:fragment="header">
    <div class="header py-2" style="background-color: #05428c; border-bottom: 2px solid rgba(255, 255, 255, 0.2);">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-8 col-md-9 text-center">
                    <h1 class="text-white m-0 fs-6 fs-md-2 fw-bold text-uppercase" style="line-height: 1.2; letter-spacing: 1.5px; text-shadow: 1px 1px 3px rgba(0,0,0,0.3);">
                        Phòng Vật tư Ống thép Hòa Phát Đà Nẵng
                    </h1>
                </div>
                <!-- User Dropdown -->
                <div class="col-4 col-md-3 text-end">
                    <div class="dropdown">
                        <a class="greeting-text dropdown-toggle text-warning text-decoration-none"
                           href="#"
                           data-bs-toggle="dropdown"
                           aria-expanded="false"
                           th:text="${username}">
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <form th:action="@{/logout}" method="post" style="margin: 0;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="dropdown-item text-danger">Đăng xuất</button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Navbar -->
<div th:fragment="nav">
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/home}">
                <img src="https://www.hoaphat.com.vn/assets/images/logo.png" alt="Logo" style="max-height: 40px;">
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" 
                    aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link font-style" th:href="@{/home/employee/private}">Lịch cần làm</a>
                    </li>
                    <li class="nav-item d-none d-lg-block">
                        <a class="nav-link font-style" th:href="@{/home/employee/video}">Lưu giữ video</a>
                    </li>
                    <li class="nav-item d-none d-lg-block">
                        <a class="nav-link font-style" th:href="@{/home/employee/image}">Lưu giữ hình ảnh</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle font-style" href="#" id="navbarDropdownMenuLink"
                           role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Giao việc (chỉ quản lý)
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdownMenuLink">
                            <li><a class="dropdown-item font-style" th:href="@{/home/manager/task}">Giao việc cá nhân</a></li>
                            <li><a class="dropdown-item font-style" th:href="@{/home/manager/weeklyTask}">Giao việc cá nhân lặp lại định kỳ</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item font-style" th:href="@{/home/manager/create-account}">Tạo tài khoản</a></li>
                            <li><a class="dropdown-item font-style text-danger" th:href="@{/home/manager/delete-account}">Xóa tài khoản</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>
</body>
</html>
