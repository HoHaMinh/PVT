<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Header</title>
</head>
<body>
<!-- Header -->
<div th:fragment="header">
    <div class="row text-center header align-items-center">
        <h2 style="color: white" class="col-10">
            PHÒNG VẬT TƯ ỐNG THÉP HÒA PHÁT ĐÀ NẴNG
        </h2>
        <div class="col-2 d-flex justify-content-end align-items-center">
            <div class="dropdown">
                <a class="greeting-text dropdown-toggle text-warning text-decoration-none"
                   href="#"
                   data-bs-toggle="dropdown"
                   aria-expanded="false"
                   th:text="'Xin chào: ' + ${username}">
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <form th:action="@{/logout}" method="post" style="margin: 0;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="dropdown-item">Đăng xuất</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>

<!-- Navbar -->
<div th:fragment="nav">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand col-12 col-md-3 col-lg-4 align-items-center" th:href="@{/home}">
                <img src="https://www.hoaphat.com.vn/assets/images/logo.png" class="img-fluid">
            </a>
            <div class="collapse navbar-collapse col-12 col-md-9 col-lg-8 align-items-center"
                 id="navbarNavDropdown">
                <ul class="navbar-nav">
                    <li class="nav-item active">
                        <a class="nav-link font-style" aria-current="page" th:href="@{/home/employee/private}">Lịch cần làm</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link font-style" th:href="@{/home/employee/video}">Lưu giữ video</a>
                    </li>
                    <li class="nav-item ">
                        <a class="nav-link font-style" th:href="@{/home/employee/image}">Lưu giữ hình ảnh</a>
                    </li>
                    <li class="nav-item dropdown ">
                        <a class="nav-link dropdown-toggle font-style" th:href="@{/home/manager/task}" id="navbarDropdownMenuLink"
                           role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Giao việc (chỉ quản lý)
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdownMenuLink">
                            <li><a class="dropdown-item font-style" th:href="@{/home/manager/task}">Giao việc cá nhân</a></li>
                            <li><a class="dropdown-item font-style" th:href="@{/home/manager/weeklyTask}">Giao việc cá nhân lặp lại định kỳ</a></li>
                            <li>
                                <a class="dropdown-item font-style" th:href="@{/home/manager/create-account}">
                                    Tạo tài khoản
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item font-style" th:href="@{/home/manager/delete-account}">
                                    Xóa tài khoản
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>
</body>
</html>
