<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Bắt buộc cho Mobile -->
    <title>Thêm mới việc lặp lại PVT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    
    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <style>
        /* Làm đẹp Card nhập liệu */
        .task-card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .task-card-header {
            background-color: #05428c;
            color: white;
            font-weight: bold;
            padding: 10px 20px;
        }
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var flatpickrInputs = document.querySelectorAll('.flatpickr-input');
            var fpInstances = Array.from(flatpickrInputs).map(input => flatpickr(input, {
                enableTime: true,
                dateFormat: "Y-m-d\\TH:i",
                altInput: true,
                altFormat: "d-m-Y H:i",
                time_24hr: true
            }));

            document.querySelector('#form').addEventListener('submit', function(e) {
                var allDatesSelected = fpInstances.every(fp => fp.selectedDates.length > 0);
                if (!allDatesSelected) {
                    e.preventDefault();
                    alert('Phải chọn deadline cho tất cả công việc được giao!');
                }
            });
        });

        function showDialog() {
            var numberOfRows = prompt("Hãy nhập số lượng công việc lặp lại bạn muốn giao:");
            if (numberOfRows != null && numberOfRows > 0) {
                var url = "/home/manager/weeklyTask/showAddWeekEventForm?rows=" + numberOfRows;
                window.location.href = url; // Đổi cách chuyển trang cho mượt hơn
            }
        }
    </script>
</head>
<body class="bg-light">
<div class="container-fluid p-0">
    <div th:replace="~{fragments :: header}"></div>
    <nav th:replace="~{fragments :: nav}"></nav>
    
    <div class="container mt-4 mb-5">
        <!-- Tiêu đề và Nút thêm số lượng -->
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
            <h4 class="text-primary fw-bold m-0">Giao việc cá nhân lặp lại</h4>
            <button type="button" class="btn btn-primary shadow-sm" onclick="showDialog()">
                + Chọn số lượng việc cần giao
            </button>
        </div>

        <!-- Form nhập liệu -->
        <form method="post" th:action="@{/home/manager/weeklyTask/addWeekEvent}" th:object="${monthEventManager}" id="form">
            
            <!-- Vòng lặp tạo ra các Card thay vì các thẻ <tr> -->
            <div th:each="weekEvent, stat : ${weekEvents}" class="card task-card">
                <div class="task-card-header">
                    Công việc #<span th:text="${stat.count}"></span>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <!-- Nội dung -->
                        <div class="col-12">
                            <label class="form-label">Nội dung công việc <span class="text-danger">*</span></label>
                            <textarea th:field="*{monthEvents[__${stat.index}__].monthEventDescription}" 
                                      class="form-control" rows="2" placeholder="Nhập nội dung..." required></textarea>
                        </div>

                        <!-- Người phụ trách -->
                        <div class="col-12 col-md-4">
                            <label class="form-label">Người phụ trách <span class="text-danger">*</span></label>
                            <select th:field="*{monthEvents[__${stat.index}__].account.accountName}" class="form-select" required>
                                <option value="">-- Chọn người phụ trách --</option>
                                <option value="ALL" class="fw-bold text-danger">🔥 Cả phòng</option>
                                <option th:each="acc : ${accounts}"
                                        th:value="${acc.accountName}"
                                        th:text="${acc.displayName}">
                                </option>
                            </select>
                        </div>

                        <!-- Deadline -->
                        <div class="col-12 col-md-4">
                            <label class="form-label">Deadline gốc <span class="text-danger">*</span></label>
                            <input type="text" class="form-control flatpickr-input bg-white" 
                                   placeholder="Bấm chọn thời gian" 
                                   th:field="*{monthEvents[__${stat.index}__].monthEventDeadline}" required>
                        </div>

                        <!-- Gia hạn tự động -->
                        <div class="col-12 col-md-4">
                            <label class="form-label">Tự động gia hạn (Số ngày) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" min="1"
                                   th:field="*{monthEvents[__${stat.index}__].extendDay}" 
                                   placeholder="Ví dụ: 7" required>
                        </div>

                        <!-- Trạng thái ẩn (Mặc định 2) -->
                        <input type="hidden" th:value="2" th:name="|monthEvents[${stat.index}].monthEventStatus|">
                    </div>
                </div>
            </div>

            <!-- Nút Submit và Trở về -->
            <div th:if="${not #lists.isEmpty(weekEvents)}" class="d-flex flex-wrap gap-2 mt-4 pt-3 border-top">
                <button type="submit" class="btn btn-success px-5 fw-bold">Lưu tất cả</button>
                <a th:href="@{/home/manager/weeklyTask}" class="btn btn-outline-secondary ms-auto">
                    Hủy & Trở về
                </a>
            </div>
            
            <!-- Thông báo nếu chưa chọn số lượng -->
            <div th:if="${#lists.isEmpty(weekEvents)}" class="text-center py-5 text-muted">
                <h5>Vui lòng bấm nút "Chọn số lượng việc cần giao" ở góc trên.</h5>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
