spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/pvt?createDatabaseIfNotExist=true&useSSL=false&useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=80
spring.jackson.serialization.write_dates_as_timestamps=false
spring.mvc.view.prefix=classpath:/templates/
spring.mvc.view.suffix=.html
image.folder.path=E:/IT/images
video.folder.path=E:/IT/videos
server.forward-headers-strategy=framework
server.servlet.session.cookie.secure=true
